<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAKAMI TrustFlow | Infraestrutura Ciberfísica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #050a05; color: #ffffff; }
        h1, h2 { font-family: 'Montserrat', sans-serif; }
        .hero-bg { 
            background: linear-gradient(135deg, rgba(5, 10, 5, 0.95), rgba(5, 10, 5, 0.95)), url('assets/1._Página_Inicial_(Home).png'); 
            background-size: cover; 
            background-position: center; 
        }
    </style>
</head>
<body class="antialiased">

    <header class="fixed top-0 w-full z-50 p-4 bg-black/90 backdrop-blur-md border-b border-green-900">
        <div class="container mx-auto flex justify-between items-center">
            <img src="assets/Logo_YAKAMI_GERAL.png" alt="YAKAMI TECH" class="h-10">
            <a href="https://github.com/erickthenight/Yakami-TrustFlow-HackWeb" target="_blank" class="bg-green-800 px-6 py-2 rounded-full text-xs font-bold uppercase hover:bg-green-700 transition-all">Repositório</a>
        </div>
    </header>

    <main class="hero-bg min-h-screen flex items-center justify-center pt-20 text-center px-4">
        <div>
            <h1 class="text-5xl md:text-8xl font-black mb-6 uppercase">YAKAMI <span class="text-green-600">TRUSTFLOW</span></h1>
            <p class="text-xl mb-10 text-gray-300 max-w-2xl mx-auto">A Verdade de Solo da Amazônia. Infraestrutura ciberfísica e Smart Contracts.</p>
            <a href="#conteudo" class="bg-green-800 hover:bg-green-700 font-black py-4 px-12 rounded-full transition-all">EXPLORAR ARQUITETURA</a>
        </div>
    </main>

    <section id="conteudo" class="py-20 container mx-auto px-6 max-w-6xl">
        <div class="space-y-12">
            <img src="assets/1._Página_Inicial_(Home).png" class="rounded-2xl shadow-2xl">
            <img src="assets/2._Tecnologia_e_Hardware_(ECO_Stations).png" class="rounded-2xl shadow-2xl">
            <img src="assets/3._Tokenomics_(Ecossistema_YKM).png" class="rounded-2xl shadow-2xl">
            <img src="assets/4._Impacto_Social_(Trilha_do_Aprendiz).png" class="rounded-2xl shadow-2xl">
            <img src="assets/5._Soluções_e_Uso_Dual_(Logística_e_Defesa).png" class="rounded-2xl shadow-2xl">
            <img src="assets/6._Dashboard_e_Transparência_(Acesso_ao_Sistema).png" class="rounded-2xl shadow-2xl">
        </div>
    </section>

    <footer class="py-10 border-t border-green-900 text-center text-sm text-gray-500">
        <img src="assets/Logo_YAKAMI_ECO_FLOW_PRETO_E_BRANCO_2.jpg" class="h-8 mx-auto mb-4 opacity-50">
        <p>© 2026 YAKAMI TECH – Infraestrutura Ciberfísica Soberana.</p>
    </footer>

</body>
</html>
